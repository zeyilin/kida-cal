name: publish-ics-feed

# Default deployment: build the .ics hourly and publish it to GitHub Pages so it has
# a stable public URL you can subscribe to in Google Calendar ("From URL"). $0/mo on
# a public repo. No Google credentials required.

on:
  # Manual only. The live Google Calendar API path (sync.yml) is now the scheduled one;
  # running both hourly would double-hit Timely. This .ics feed remains a credential-free
  # fallback you can rebuild on demand. Re-enable the cron below to use the feed instead.
  workflow_dispatch: {}
  # schedule:
  #   - cron: "0 * * * *"     # Google re-fetches a subscribed .ics URL slowly (~8–24h).

# GitHub Pages deploy needs these.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Build .ics feed
        # Exits non-zero (without writing) if the fetch failed, so a bad run can't
        # publish an empty feed — the previous Pages deployment stays live.
        run: python -m src.build_feed --out public/open_slots.ics
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

name: sync-open-slots

# OPTIONAL low-latency path: write directly into a Google Calendar via the API, which
# updates within the hour (unlike the .ics-URL subscription, which Google refreshes
# slowly). Requires the one-time OAuth setup + repo secrets. Disabled on a schedule by
# default so it doesn't double-hit Timely alongside feed.yml — enable the cron below if
# you want this as your primary instead of the .ics feed.

on:
  workflow_dispatch: {}       # manual "Run workflow" button
  # schedule:
  #   - cron: "0 * * * *"     # uncomment to run hourly (then consider disabling feed.yml)

# Never run two syncs at once (they'd race on the same events).
concurrency:
  group: sync-open-slots
  cancel-in-progress: false

permissions:
  contents: write             # for the keepalive commit of open_slots.ics

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-calendar.txt

      - name: Restore Google OAuth token + client secret from secrets
        env:
          KIDA_TOKEN_JSON: ${{ secrets.KIDA_TOKEN_JSON }}
          KIDA_CLIENT_SECRET_JSON: ${{ secrets.KIDA_CLIENT_SECRET_JSON }}
        run: |
          mkdir -p ~/.config/kida-cal
          printf '%s' "$KIDA_TOKEN_JSON" > ~/.config/kida-cal/token.json
          printf '%s' "$KIDA_CLIENT_SECRET_JSON" > client_secret.json

      - name: Sync calendar + regenerate .ics
        env:
          KIDA_GOOGLE_CLIENT_SECRET: client_secret.json
        run: python -m src.sync_calendar --ics open_slots.ics

      - name: Keepalive commit of open_slots.ics
        # Committing keeps the scheduled workflow from being auto-disabled after
        # ~60 days of no repo activity, and doubles as an Apple-Calendar ICS feed.
        run: |
          git config user.name "kida-cal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add open_slots.ics
          if git diff --cached --quiet; then
            echo "no slot changes this run"
          else
            git commit -m "chore: refresh open slots ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

      - name: Clean up secrets on runner
        if: always()
        run: rm -f client_secret.json ~/.config/kida-cal/token.json

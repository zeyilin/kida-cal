name: sync-open-slots

# LIVE calendar path: write open slots straight into a Google Calendar via the API, which
# reflects in your (and any subscriber's native Google) calendar within the hour — unlike
# the .ics-URL subscription, which Google refreshes slowly.
#
# Auth: a Google service account (secrets.KIDA_SERVICE_ACCOUNT_JSON). The target calendar
# (secrets.KIDA_CALENDAR_ID) must be shared with the service account's email with
# "Make changes to events". See README.

on:
  schedule:
    - cron: "0 * * * *"       # top of every hour (UTC)
  workflow_dispatch: {}        # manual "Run workflow" button

# Never run two syncs at once (they'd race on the same events).
concurrency:
  group: sync-open-slots
  cancel-in-progress: false

permissions:
  contents: write             # for the keepalive commit of open_slots.ics

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check configuration
        id: cfg
        env:
          SA: ${{ secrets.KIDA_SERVICE_ACCOUNT_JSON }}
          CID: ${{ secrets.KIDA_CALENDAR_ID }}
        run: |
          if [ -z "$SA" ] || [ -z "$CID" ]; then
            echo "::notice::KIDA_SERVICE_ACCOUNT_JSON / KIDA_CALENDAR_ID not set yet — skipping sync (add secrets to enable). See README Path A."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.cfg.outputs.configured == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - if: steps.cfg.outputs.configured == 'true'
        run: pip install -r requirements-calendar.txt

      - name: Restore service-account key from secret
        if: steps.cfg.outputs.configured == 'true'
        env:
          KIDA_SERVICE_ACCOUNT_JSON_CONTENT: ${{ secrets.KIDA_SERVICE_ACCOUNT_JSON }}
        run: printf '%s' "$KIDA_SERVICE_ACCOUNT_JSON_CONTENT" > sa-key.json

      - name: Sync calendar + regenerate .ics
        if: steps.cfg.outputs.configured == 'true'
        env:
          KIDA_SERVICE_ACCOUNT_JSON: sa-key.json
          KIDA_CALENDAR_ID: ${{ secrets.KIDA_CALENDAR_ID }}
        run: python -m src.sync_calendar --ics open_slots.ics

      - name: Keepalive commit of open_slots.ics
        if: steps.cfg.outputs.configured == 'true'
        # Doubles as (1) a fallback .ics and (2) repo activity so the scheduled workflow
        # isn't auto-disabled after ~60 days of inactivity.
        run: |
          git config user.name "kida-cal-bot"
          git config user.email "actions@users.noreply.github.com"
          git add open_slots.ics
          if git diff --cached --quiet; then
            echo "no slot changes this run"
          else
            git commit -m "chore: refresh open slots ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

      - name: Clean up secret on runner
        if: always()
        run: rm -f sa-key.json

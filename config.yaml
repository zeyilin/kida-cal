# KIDA NYC → open-slots calendar config.
# See docs/timely-api.md for service/staff ids.

lookahead_days: 90
timezone: America/New_York

# Which stylists to include. Use "all" or a list of names (case-insensitive).
# Known: Masa, Satomi, Nao (stylists) · Sachi, Taka (Aki), Yohei, Fausto (master barbers) · Hiroki (junior)
stylists: all

# Service allowlist by NAME (case-insensitive substring), or "all" for every online
# service (cuts, color, highlights, blowout, beard work, deep conditioner, …).
services: all

exclude_phone_only: true     # kids haircut / bang trim / keratin aren't bookable online anyway
min_slot_hour: null          # e.g. 18 to only show evening slots (local hour, 0-23)
weekends_only: false

# Politeness / safety
request_delay_seconds: 1.0
max_requests_per_run: 6000     # 90-day × all services × all staff needs headroom
cache_ttl_seconds: 900       # dev cache for identical (service,staff,month/day) reads

# Google Calendar (live API path). With service-account auth the calendar id is REQUIRED
# (a service account can't create a calendar in your account): set it here for local use,
# or via the KIDA_CALENDAR_ID env/secret in CI (env wins). Get it from the calendar's
# Settings → Integrate calendar → Calendar ID.
calendar_id: null
calendar_name: "KIDA NYC — Open Slots"
calendar_color_id: "5"       # a distinct color (banana/yellow)

# Stable public booking link (no per-slot deep link exists — see docs/timely-api.md)
booking_url: "https://bookings.gettimely.com/kidanyc/bb/book"
